<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Uhren-Lernwerkzeug%20DaZ%22%2C%22short_name%22%3A%22Uhr%20DaZ%22%2C%22start_url%22%3A%22.%2Fuhr-lernwerkzeug.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231e2433%22%2C%22theme_color%22%3A%22%231e2433%22%2C%22orientation%22%3A%22landscape%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D%2527http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%2527%2520viewBox%3D%25270%25200%2520192%2520192%2527%253E%253Ccircle%2520cx%3D%252796%2527%2520cy%3D%252796%2527%2520r%3D%252796%2527%2520fill%3D%2527%25231e2433%2527%2F%253E%253Ccircle%2520cx%3D%252796%2527%2520cy%3D%252796%2527%2520r%3D%252780%2527%2520fill%3D%2527%2523f0ece4%2527%2F%253E%253Ccircle%2520cx%3D%252796%2527%2520cy%3D%252796%2527%2520r%3D%252710%2527%2520fill%3D%2527%2523c9715a%2527%2F%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1e2433;
    --panel:     #252d3f;
    --accent:    #c9715a;
    --sage:      #7a9e87;
    --off-white: #f0ece4;
    --muted:     #8892a4;
    --border:    #313c52;
    --radius:    14px;
    --font:      'DM Sans', system-ui, sans-serif;
    --mono:      'DM Mono', 'Roboto Mono', monospace;
  }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--off-white);
    font-family: var(--font);
  }

  body {
    display: flex;
    align-items: stretch;
    justify-content: center;
  }

  /* ══ LAYOUT: clock left, panel right ══ */
  .app {
    display: flex;
    width: 100%;
    height: 100%;
    max-width: 1920px;
  }

  /* ── CLOCK SECTION (takes ~70% of width) ── */
  .clock-section {
    flex: 0 0 70%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 20px 16px;
    background: var(--bg);
  }

  .clock-wrap {
    position: relative;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .clock-wrap:active { cursor: grabbing; }

  #clockSvg {
    /* fills the available height, max ~860px */
    width: clamp(460px, 82vh, 860px);
    height: clamp(460px, 82vh, 860px);
    filter: drop-shadow(0 12px 48px rgba(0,0,0,0.55));
  }

  /* controls below the clock */
  .clock-controls {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* AM/PM Toggle */
  .ampm-row {
    display: flex;
    align-items: center;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 4px;
  }
  .ampm-btn {
    font-family: var(--font);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 11px 26px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: background 0.2s, color 0.2s;
  }
  .ampm-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* Random button */
  .btn-random {
    font-family: var(--font);
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 13px 28px;
    background: var(--sage);
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 9px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-random:hover { opacity: 0.88; }
  .btn-random:active { transform: scale(0.97); }

  /* ── RIGHT PANEL ── */
  .panel-section {
    flex: 1;
    background: var(--panel);
    border-left: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
    padding: 32px 30px;
    overflow: hidden;
  }

  .card {
    padding: 20px 0;
    border-bottom: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card:last-child { border-bottom: none; }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .panel-label {
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .digital-time {
    font-family: var(--mono);
    font-size: clamp(3rem, 4.5vw, 5rem);
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.06em;
    line-height: 1;
    transition: opacity 0.25s;
  }

  .text-display {
    font-size: clamp(1.4rem, 2.1vw, 2rem);
    font-weight: 400;
    color: var(--off-white);
    line-height: 1.45;
    min-height: 2em;
    transition: opacity 0.25s;
  }

  .hidden { opacity: 0 !important; pointer-events: none; }

  /* Eye toggle */
  .btn-eye {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted);
    transition: color 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .btn-eye:hover { color: var(--off-white); border-color: var(--off-white); }
  .btn-eye.active { color: var(--accent); border-color: var(--accent); }

  /* Speak buttons */
  .btn-speak {
    font-family: var(--font);
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 10px 20px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 50px;
    color: var(--off-white);
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background 0.2s, border-color 0.2s;
    align-self: flex-start;
    margin-top: 2px;
  }
  .btn-speak:hover { background: var(--border); }
  .btn-speak:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-speak.speaking { border-color: var(--accent); color: var(--accent); }

  .app-title {
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  /* PWA safe-area padding (notch / Android nav bar) */
  @supports (padding: env(safe-area-inset-left)) {
    .app {
      padding-left:  env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    body {
      padding-bottom: env(safe-area-inset-bottom);
    }
  }

  /* Prevent text selection during touch drag */
  svg, .clock-wrap { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div class="app">

  <!-- ══ LEFT: CLOCK ══ -->
  <div class="clock-section">

    <div class="clock-wrap" id="clockWrap">
      <svg id="clockSvg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
        <!-- Face -->
        <circle cx="250" cy="250" r="240" fill="#f0ece4"/>
        <circle cx="250" cy="250" r="240" fill="none" stroke="#b8b2a8" stroke-width="2.5"/>
        <!-- subtle inner ring -->
        <circle cx="250" cy="250" r="228" fill="none" stroke="#1e2433" stroke-width="1" opacity="0.07"/>

        <!-- Tick marks (drawn by JS) -->
        <g id="tickMarks"></g>

        <!-- Hour numbers (drawn by JS) -->
        <g id="hourNumbers"></g>

        <!-- Hour hand -->
        <line id="hourHand" x1="250" y1="250" x2="250" y2="148"
          stroke="#1e2433" stroke-width="11" stroke-linecap="round"/>

        <!-- Minute hand -->
        <line id="minuteHand" x1="250" y1="250" x2="250" y2="72"
          stroke="#1e2433" stroke-width="5.5" stroke-linecap="round"/>

        <!-- Tail of minute hand (subtle) -->
        <line id="minuteTail" x1="250" y1="250" x2="250" y2="270"
          stroke="#1e2433" stroke-width="5.5" stroke-linecap="round" opacity="0.25"/>

        <!-- Center -->
        <circle cx="250" cy="250" r="11" fill="#c9715a"/>
        <circle cx="250" cy="250" r="5"  fill="#f0ece4"/>
      </svg>
    </div>

    <div class="clock-controls">
      <!-- AM/PM -->
      <div class="ampm-row">
        <button class="ampm-btn active" id="btnAM" onclick="setAmPm('AM')">vormittags</button>
        <button class="ampm-btn"        id="btnPM" onclick="setAmPm('PM')">nachmittags</button>
      </div>

      <!-- Random -->
      <button class="btn-random" onclick="randomTime()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
        Zufällige Uhrzeit
      </button>
    </div>

    <div class="app-title">Uhren-Lernwerkzeug · DaZ / DaF</div>
  </div>

  <!-- ══ RIGHT: PANEL ══ -->
  <div class="panel-section">

    <!-- Digital -->
    <div class="card">
      <div class="card-header">
        <div>
          <div class="panel-label">24-Stunden-Anzeige</div>
          <div class="digital-time" id="digitalDisplay">09:15</div>
        </div>
        <button class="btn-eye active" id="eyeDigital"
          onclick="toggleVis('digitalDisplay','eyeDigital')" title="Einblenden / Ausblenden">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Official -->
    <div class="card">
      <div class="card-header">
        <div class="panel-label">Offizielle Ausdrucksweise</div>
        <button class="btn-eye active" id="eyeOfficial"
          onclick="toggleVis('officialText','eyeOfficial')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="text-display" id="officialText">Es ist neun Uhr fünfzehn.</div>
      <button class="btn-speak" id="speakOfficial" onclick="speak('official')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>

        Offiziell vorlesen
      </button>

    <!-- Colloquial -->
    <div class="card">
      <div class="card-header">
        <div class="panel-label">Umgangssprachlich</div>
        <button class="btn-eye active" id="eyeColloquial"
          onclick="toggleVis('colloquialText','eyeColloquial')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="text-display" id="colloquialText">Viertel nach neun.</div>
      <button class="btn-speak" id="speakColloquial" onclick="speak('colloquial')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        Umgangssprachlich vorlesen
      </button>
    </div>

  </div><!-- /panel -->
</div><!-- /app -->

<script>
/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const state = { hours: 9, minutes: 15, isAM: true };

/* ═══════════════════════════════════════════
   DRAW TICK MARKS
═══════════════════════════════════════════ */
(function drawTicks() {
  const g = document.getElementById('tickMarks');
  const cx = 250, cy = 250;
  for (let i = 0; i < 60; i++) {
    const isHour  = i % 5 === 0;
    const isQtr   = i % 15 === 0;
    const outer   = 228;
    const inner   = isQtr ? 200 : (isHour ? 207 : 220);
    const w       = isQtr ? 4.5 : (isHour ? 3 : 1.2);
    const op      = isHour ? 0.75 : 0.28;
    const rad     = (i / 60 * 360 - 90) * Math.PI / 180;
    const x1 = cx + inner * Math.cos(rad);
    const y1 = cy + inner * Math.sin(rad);
    const x2 = cx + outer * Math.cos(rad);
    const y2 = cy + outer * Math.sin(rad);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#1e2433');
    line.setAttribute('stroke-width', w);
    line.setAttribute('stroke-linecap', 'round');
    line.setAttribute('opacity', op);
    g.appendChild(line);
  }
})();

/* ═══════════════════════════════════════════
   DRAW HOUR NUMBERS
═══════════════════════════════════════════ */
(function drawNumbers() {
  const g   = document.getElementById('hourNumbers');
  const cx  = 250, cy = 250;
  const r   = 185; // radius for number placement

  for (let h = 1; h <= 12; h++) {
    const angle = (h / 12 * 360 - 90) * Math.PI / 180;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);

    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', x);
    text.setAttribute('y', y);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'central');
    text.setAttribute('font-family', "'DM Sans', system-ui, sans-serif");
    text.setAttribute('font-size', '36');
    text.setAttribute('font-weight', '600');
    text.setAttribute('fill', '#1e2433');
    text.setAttribute('opacity', '0.82');
    text.textContent = h;
    g.appendChild(text);
  }
})();

/* ═══════════════════════════════════════════
   RENDER HANDS
═══════════════════════════════════════════ */
function renderHands() {
  const { hours, minutes } = state;
  const cx = 250, cy = 250;

  // Minute hand
  const minDeg = minutes / 60 * 360;
  const minRad = (minDeg - 90) * Math.PI / 180;
  const minLen = 178, tailLen = 22;
  setLine('minuteHand',
    cx, cy,
    cx + minLen  * Math.cos(minRad),
    cy + minLen  * Math.sin(minRad));
  setLine('minuteTail',
    cx, cy,
    cx - tailLen * Math.cos(minRad),
    cy - tailLen * Math.sin(minRad));

  // Hour hand (moves continuously with minutes)
  const hrDeg = (hours % 12) / 12 * 360 + minutes / 60 * 30;
  const hrRad = (hrDeg - 90) * Math.PI / 180;
  const hrLen = 120;
  setLine('hourHand',
    cx, cy,
    cx + hrLen * Math.cos(hrRad),
    cy + hrLen * Math.sin(hrRad));

  updateDisplays();
}

function setLine(id, x1, y1, x2, y2) {
  const el = document.getElementById(id);
  el.setAttribute('x1', x1); el.setAttribute('y1', y1);
  el.setAttribute('x2', x2); el.setAttribute('y2', y2);
}

/* ═══════════════════════════════════════════
   AM / PM
═══════════════════════════════════════════ */
function setAmPm(val) {
  state.isAM = (val === 'AM');
  document.getElementById('btnAM').classList.toggle('active',  state.isAM);
  document.getElementById('btnPM').classList.toggle('active', !state.isAM);
  updateDisplays();
}

/* ═══════════════════════════════════════════
   DISPLAYS
═══════════════════════════════════════════ */
function updateDisplays() {
  const { hours, minutes, isAM } = state;
  let h24 = hours % 12;
  if (!isAM) h24 += 12;

  document.getElementById('digitalDisplay').textContent =
    String(h24).padStart(2,'0') + ':' + String(minutes).padStart(2,'0');
  document.getElementById('officialText').textContent   = makeOfficial(h24, minutes);
  document.getElementById('colloquialText').textContent = makeColloquial(hours % 12, minutes);
}

/* ═══════════════════════════════════════════
   GERMAN NUMBER WORDS
═══════════════════════════════════════════ */
const hourWords = [
  'null','ein','zwei','drei','vier','fünf','sechs',
  'sieben','acht','neun','zehn','elf','zwölf',
  'dreizehn','vierzehn','fünfzehn','sechzehn','siebzehn','achtzehn',
  'neunzehn','zwanzig','einundzwanzig','zweiundzwanzig','dreiundzwanzig'
];

// for full-hour official: "Es ist zwei Uhr" not "Es ist ein Uhr"
const hourWordsNom = [...hourWords];
hourWordsNom[1] = 'eins';

const minWords = [
  'null','eine','zwei','drei','vier','fünf','sechs','sieben','acht','neun','zehn',
  'elf','zwölf','dreizehn','vierzehn','fünfzehn','sechzehn','siebzehn','achtzehn',
  'neunzehn','zwanzig','einundzwanzig','zweiundzwanzig','dreiundzwanzig','vierundzwanzig',
  'fünfundzwanzig','sechsundzwanzig','siebenundzwanzig','achtundzwanzig','neunundzwanzig',
  'dreißig','einunddreißig','zweiunddreißig','dreiunddreißig','vierunddreißig',
  'fünfunddreißig','sechsunddreißig','siebenunddreißig','achtunddreißig','neununddreißig',
  'vierzig','einundvierzig','zweiundvierzig','dreiundvierzig','vierundvierzig',
  'fünfundvierzig','sechsundvierzig','siebenundvierzig','achtundvierzig','neunundvierzig',
  'fünfzig','einundfünfzig','zweiundfünfzig','dreiundfünfzig','vierundvierzig',
  'fünfundfünfzig','sechsundfünfzig','siebenundfünfzig','achtundfünfzig','neunundfünfzig'
];

/* ═══════════════════════════════════════════
   OFFICIAL TIME TEXT
═══════════════════════════════════════════ */
function makeOfficial(h24, min) {
  if (h24 === 0  && min === 0) return 'Es ist Mitternacht.';
  if (h24 === 12 && min === 0) return 'Es ist zwölf Uhr mittags.';
  const hWord = hourWords[h24];
  if (min === 0) return `Es ist ${h24 === 1 ? 'ein' : hWord} Uhr.`;
  // "Es ist neun Uhr fünfzehn."
  return `Es ist ${h24 === 1 ? 'ein' : hWord} Uhr ${minWords[min]}.`;
}

/* ═══════════════════════════════════════════
   COLLOQUIAL TIME TEXT – Hamburger System
   (Nord-/Westdeutsch, kein "Dreiviertel")

   EXAKTE 5-MINUTEN-SCHRITTE:
   :00  → X Uhr / Mitternacht
   :05  → fünf nach X
   :10  → zehn nach X
   :15  → Viertel nach X
   :20  → zwanzig nach X
   :25  → fünf vor halb (X+1)
   :30  → halb (X+1)
   :35  → fünf nach halb (X+1)
   :40  → zwanzig vor (X+1)
   :45  → Viertel vor (X+1)
   :50  → zehn vor (X+1)
   :55  → fünf vor (X+1)

   FREIES ZIEHEN (halb als Anker für :21–:39):
   :01–:04  → kurz nach X
   :06–:09  → kurz nach fünf nach X
   :11–:14  → kurz nach zehn nach X
   :16–:19  → kurz nach Viertel nach X
   :21      → neun vor halb (X+1)
   :22      → acht vor halb (X+1)
   :23      → sieben vor halb (X+1)
   :24      → sechs vor halb (X+1)
   :26      → vier vor halb (X+1)   [nach :25-Marke]
   :27–:29  → kurz vor halb (X+1)
   :31–:33  → kurz nach halb (X+1)
   :34      → vier nach halb (X+1)
   :36      → sechs nach halb (X+1)
   :37      → sieben nach halb (X+1)
   :38      → acht nach halb (X+1)
   :39      → neun nach halb (X+1)
   :41–:44  → kurz vor Viertel vor (X+1)
   :46–:49  → kurz vor zehn vor (X+1)
   :51–:54  → kurz vor fünf vor (X+1)
   :56–:59  → kurz vor (X+1)
═══════════════════════════════════════════ */

// colHours[0]='zwölf'(Mitternacht), [1..12]
const colHours = [
  'zwölf','eins','zwei','drei','vier','fünf','sechs',
  'sieben','acht','neun','zehn','elf','zwölf'
];

// Zahlwörter 1–29 für exakte Minuten-Ansagen
const minNums = [
  '','eine','zwei','drei','vier','fünf','sechs','sieben','acht','neun','zehn',
  'elf','zwölf','dreizehn','vierzehn','fünfzehn','sechzehn','siebzehn','achtzehn','neunzehn','zwanzig'
];

function _cur(h12)  { return colHours[h12 === 0 ? 0 : h12]; }
function _next(h12) { return colHours[((h12 + 1) % 12) || 12]; }

function makeColloquial(h12, min) {
  const cur  = _cur(h12);
  const next = _next(h12);

  // ── Volle Stunde ──
  if (min === 0) return h12 === 0 ? 'Mitternacht.' : `${cur} Uhr.`;

  // ── :01–:05 → kurz nach X ──
  if (min >= 1 && min <= 5) return `kurz nach ${cur}.`;

  // ── :06–:14 → exakte Minuten nach X ──
  if (min >= 6 && min <= 14) return `${minNums[min]} nach ${cur}.`;

  // ── :15 → Viertel nach X ──
  if (min === 15) return `Viertel nach ${cur}.`;

  // ── :16–:20 → exakte Minuten nach X ──
  if (min >= 16 && min <= 20) return `${minNums[min]} nach ${cur}.`;

  // ── :21–:24 → exakte Minuten vor halb (9,8,7,6 vor halb) ──
  if (min >= 21 && min <= 24) return `${minNums[30 - min]} vor halb ${next}.`;

  // ── :25–:29 → kurz vor halb ──
  if (min >= 25 && min <= 29) return `kurz vor halb ${next}.`;

  // ── :30 → halb ──
  if (min === 30) return `halb ${next}.`;

  // ── :31–:35 → kurz nach halb ──
  if (min >= 31 && min <= 35) return `kurz nach halb ${next}.`;

  // ── :36–:39 → exakte Minuten nach halb (6,7,8,9 nach halb) ──
  if (min >= 36 && min <= 39) return `${minNums[min - 30]} nach halb ${next}.`;

  // ── :40 → zwanzig vor X+1 ──
  if (min === 40) return `zwanzig vor ${next}.`;

  // ── :41–:44 → exakte Minuten vor X+1 (19,18,17,16 vor) ──
  if (min >= 41 && min <= 44) return `${minNums[60 - min]} vor ${next}.`;

  // ── :45 → Viertel vor X+1 ──
  if (min === 45) return `Viertel vor ${next}.`;

  // ── :46–:54 → exakte Minuten vor X+1 (14,13,...,6 vor) ──
  if (min >= 46 && min <= 54) return `${minNums[60 - min]} vor ${next}.`;

  // ── :55–:59 → kurz vor X+1 ──
  if (min >= 55 && min <= 59) return `kurz vor ${next}.`;

  return `${min} Minuten nach ${cur}.`;
}

/* ═══════════════════════════════════════════
   TOGGLE VISIBILITY (eye buttons)
═══════════════════════════════════════════ */
const SVG_EYE_OPEN = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const SVG_EYE_OFF  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

function toggleVis(targetId, btnId) {
  const el  = document.getElementById(targetId);
  const btn = document.getElementById(btnId);
  const nowHidden = el.classList.toggle('hidden');
  btn.classList.toggle('active', !nowHidden);
  btn.innerHTML = nowHidden ? SVG_EYE_OFF : SVG_EYE_OPEN;
}

/* ═══════════════════════════════════════════
   SPEECH
═══════════════════════════════════════════ */
const speechOK = 'speechSynthesis' in window;

function speak(mode) {
  if (!speechOK) return;
  window.speechSynthesis.cancel();
  const text = mode === 'official'
    ? document.getElementById('officialText').textContent
    : document.getElementById('colloquialText').textContent;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang  = 'de-DE';
  utt.rate  = 0.9;
  utt.pitch = 1.0;
  const btnId = mode === 'official' ? 'speakOfficial' : 'speakColloquial';
  const btn   = document.getElementById(btnId);
  btn.classList.add('speaking');
  utt.onend = utt.onerror = () => btn.classList.remove('speaking');
  window.speechSynthesis.speak(utt);
}

if (!speechOK) {
  document.getElementById('speakOfficial').disabled   = true;
  document.getElementById('speakColloquial').disabled = true;
}

/* ═══════════════════════════════════════════
   RANDOM TIME
═══════════════════════════════════════════ */
function randomTime() {
  state.hours   = Math.floor(Math.random() * 12);      // 0–11
  state.minutes = Math.floor(Math.random() * 60);       // 0–59
  renderHands();
}

/* ═══════════════════════════════════════════
   DRAG: mouse + touch
═══════════════════════════════════════════ */
let dragging = null; // 'hour' | 'minute' | null

function svgCenter() {
  const r = document.getElementById('clockSvg').getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

function clientXY(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}

function angleFrom(e, ctr) {
  const { x, y } = clientXY(e);
  let a = Math.atan2(y - ctr.y, x - ctr.x) * 180 / Math.PI + 90;
  return ((a % 360) + 360) % 360;
}

function angularDiff(a, b) {
  let d = Math.abs(a - b) % 360;
  return d > 180 ? 360 - d : d;
}

function curMinAngle() { return state.minutes / 60 * 360; }
function curHrAngle()  { return (state.hours % 12) / 12 * 360 + state.minutes / 60 * 30; }

function onDown(e) {
  const ctr    = svgCenter();
  const angle  = angleFrom(e, ctr);
  const dMin   = angularDiff(angle, curMinAngle());
  const dHr    = angularDiff(angle, curHrAngle());
  if (Math.min(dMin, dHr) > 28) return; // too far from both hands
  dragging = dMin <= dHr ? 'minute' : 'hour';
  e.preventDefault();
}

function onMove(e) {
  if (!dragging) return;
  e.preventDefault();
  const angle = angleFrom(e, svgCenter());

  if (dragging === 'minute') {
    // snap to nearest minute
    state.minutes = Math.round(angle / 6) % 60;
    if (state.minutes < 0) state.minutes += 60;
  } else {
    // snap to nearest hour
    const rawH = angle / 30;
    state.hours = Math.round(rawH) % 12;
    if (state.hours < 0) state.hours += 12;
  }
  renderHands();
}

function onUp() { dragging = null; }

const wrap = document.getElementById('clockWrap');
wrap.addEventListener('mousedown',  onDown,  { passive: false });
wrap.addEventListener('touchstart', onDown,  { passive: false });
document.addEventListener('mousemove',  onMove, { passive: false });
document.addEventListener('touchmove',  onMove, { passive: false });
document.addEventListener('mouseup',    onUp);
document.addEventListener('touchend',   onUp);

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
renderHands();

/* ═══════════════════════════════════════════
   PWA: Service Worker (inline blob trick)
   Registers a minimal SW so the browser treats
   this page as a PWA (installable, offline).
   Works when served over HTTP/HTTPS; silently
   skipped on file:// (no SW scope there).
═══════════════════════════════════════════ */
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  const swCode = `
    const CACHE = 'uhr-daz-v1';
    const ASSETS = [self.location.href.replace(/\\/sw\\.js.*/, '') || '/'];

    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting())
      );
    });

    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        ).then(() => self.clients.claim())
      );
    });

    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).catch(() =>
          caches.match(e.request)
        ))
      );
    });
  `;
  const blob   = new Blob([swCode], { type: 'application/javascript' });
  const swUrl  = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {/* silent fallback */});
}
</script>
